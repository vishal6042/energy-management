spring.application.name=orchestrator
server.port=8090

# Ollama (local LLM runtime)
orchestrator.ollama.base-url=http://localhost:11434
orchestrator.ollama.chat-model=qwen3.5:9b
# Embedding model: BGE-Large EN v1.5 via Ollama (1024-dim).
# (If you switch models, update embedding-dim and recreate the collection.)
orchestrator.ollama.embedding-model=bge-large

# Qdrant (vector store)
orchestrator.qdrant.base-url=http://localhost:6333
orchestrator.qdrant.collection=bems_knowledge
orchestrator.embedding-dim=1024

# Existing data/action API (system of record)
orchestrator.backend.base-url=http://localhost:8080

# RAG knowledge documents (drop .md/.txt files here, then POST /api/assistant/reindex)
orchestrator.knowledge-dir=./knowledge
orchestrator.top-k=6

# Read-only connection to the backend's Postgres DB for the SQL agent.
# read-only=true is a hard guard: any write fails in the connection pool.
spring.datasource.url=jdbc:postgresql://localhost:5432/dems-db
spring.datasource.username=postgres
spring.datasource.password=qwerty
spring.datasource.hikari.read-only=true
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.pool-name=sql-agent-ro
# schema.sql is the agent's prompt context, NOT a DB init script — never run it.
spring.sql.init.mode=never

orchestrator.sql.max-rows=200
orchestrator.sql.timeout-seconds=5
